<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Familia Vila Villar — Línea de Tiempo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:        #1a2744;
      --gold:        #c9a84c;
      --cream:       #f8f4ed;
      --cream-dark:  #ede8df;
      --text:        #2c2416;
      --text-light:  #6b5d4a;
      --family-col:  #1a3a6b;
      --history-col: #7a2020;
      --family-bg:   #e8eef6;
      --history-bg:  #f6e8e8;
      --line-color:  #c9a84c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      padding: 1.2rem 2rem 1rem;
      text-align: center;
    }

    .header-ornament {
      color: var(--gold);
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      font-family: 'Cinzel', serif;
      opacity: 0.7;
      margin-bottom: 0.3rem;
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.1rem, 4vw, 1.8rem);
      font-weight: 600;
      color: var(--cream);
      letter-spacing: 0.08em;
    }

    header h1 span { color: var(--gold); }

    .header-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: rgba(248,244,237,0.6);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    /* ── NAV BACK ── */
    .nav-back {
      background: var(--navy);
      border-top: 1px solid rgba(201,168,76,0.2);
      padding: 0.5rem 1.5rem;
    }

    .nav-back a {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(248,244,237,0.5);
      text-decoration: none;
    }

    .nav-back a:hover { color: var(--gold); }

    /* ── LEGEND BAR ── */
    .legend-bar {
      display: flex;
      gap: 2rem;
      justify-content: center;
      align-items: center;
      padding: 0.8rem 1.5rem;
      background: var(--cream-dark);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── TIMELINE WRAPPER ── */
    .timeline-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    /* ── ERA LABELS ── */
    .era-block {
      margin-bottom: 0.5rem;
      margin-top: 2rem;
    }

    .era-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.8;
      border-bottom: 1px solid rgba(201,168,76,0.25);
      padding-bottom: 0.3rem;
      margin-bottom: 1rem;
    }

    /* ── GENERATION LABEL ── */
    .generation-label {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--family-col);
      opacity: 0.6;
      margin: 1.5rem 0 0.5rem 0;
      padding-left: calc(50% + 1rem);
    }

    /* ── TWO-COLUMN ROW ── */
    .tl-row {
      display: grid;
      grid-template-columns: 1fr 40px 1fr;
      align-items: start;
      margin-bottom: 0.6rem;
      position: relative;
    }

    /* Centre spine */
    .tl-spine {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 0.55rem;
    }

    .tl-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid white;
      flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
      position: relative;
      z-index: 2;
    }

    .tl-spine-line {
      width: 2px;
      flex: 1;
      min-height: 8px;
      background: linear-gradient(to bottom, var(--line-color), rgba(201,168,76,0.2));
    }

    /* ── CARDS ── */
    .tl-card {
      padding: 0.65rem 0.9rem;
      border-radius: 0;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s;
      position: relative;
    }

    .tl-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    }

    .tl-card.family {
      background: white;
      border-left: 3px solid var(--family-col);
      margin-right: 0.5rem;
      text-align: right;
    }

    .tl-card.history {
      background: white;
      border-right: 3px solid var(--history-col);
      margin-left: 0.5rem;
      text-align: left;
    }

    .tl-card.empty { visibility: hidden; }

    .tl-year {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 0.15rem;
    }

    .tl-card.family .tl-year { color: var(--family-col); }
    .tl-card.history .tl-year { color: var(--history-col); }

    .tl-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.25;
      color: var(--text);
    }

    .tl-subtitle {
      font-family: 'EB Garamond', serif;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--text-light);
      margin-top: 0.15rem;
      line-height: 1.35;
    }

    /* Expanded detail */
    .tl-detail {
      display: none;
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--cream-dark);
      font-size: 0.88rem;
      line-height: 1.65;
      color: var(--text-light);
      font-style: italic;
      text-align: left;
    }

    .tl-card.open .tl-detail { display: block; }

    /* Dot colors */
    .dot-family    { background: var(--family-col); }
    .dot-historia  { background: var(--history-col); }
    .dot-nacimiento{ background: #2a5c3f; }
    .dot-boda      { background: var(--gold); }
    .dot-muerte    { background: #444; }

    /* ── YEAR RULER ── */
    .year-ruler {
      display: grid;
      grid-template-columns: 1fr 40px 1fr;
      margin-bottom: 0.2rem;
    }

    .year-ruler-label {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--gold);
      text-align: center;
      padding: 0.2rem 0;
      background: var(--navy);
      opacity: 0.85;
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .tl-row { grid-template-columns: 28px 1fr; grid-template-rows: auto; }
      .tl-spine { grid-column: 1; grid-row: 1; }
      .tl-card.family { grid-column: 2; grid-row: 1; text-align: left; border-left: 3px solid var(--family-col); border-right: none; margin-right: 0; margin-left: 0.4rem; }
      .tl-card.history { grid-column: 2; grid-row: 1; text-align: left; margin-left: 0.4rem; }
      .tl-card.empty { display: none; }
      .generation-label { padding-left: 2rem; }
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1.5rem;
      background: var(--navy);
      color: rgba(248,244,237,0.35);
      font-family: 'Cinzel', serif;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>

// Sort by year, family before history in same year
events.sort((a, b) => a.year - b.year || (a.side === 'family' ? -1 : 1));

// ── RENDER ────────────────────────────────────────────────────────────────────
const dotClass = { family:'dot-family', nacimiento:'dot-nacimiento', boda:'dot-boda', muerte:'dot-muerte', historia:'dot-historia' };

const genLabels = {
  1: 'Generación I — Tátara-tátara abuelos (n. ~1786–1820)',
  2: 'Generación II — Tátara-abuelos (n. ~1819–1847)',
  3: 'Generación III — Bisabuelos (n. ~1849–1883)',
  4: 'Generación IV — Abuelos (n. ~1892–1905)',
  5: 'Generación V — Padres (n. ~1930–1936)',
  6: 'Generación VI — Nosotros (n. ~1964–1972)',
  7: 'Generación VII — Nuestros hijos',
};

// Group into "rows": pair family+history events near same year
// Simple approach: render each event as its own row, empty on opposite side
let lastGen = null;
let lastEra = null;
const eraBreaks = { 1808:'El siglo XIX', 1900:'El siglo XX', 1960:'La segunda mitad del siglo XX', 2000:'El siglo XXI' };

const tl = document.getElementById('timeline');
let html = '';

events.forEach((ev, i) => {
  // Era break
  for (const [breakYear, label] of Object.entries(eraBreaks)) {
    if (ev.year >= parseInt(breakYear) && (i === 0 || events[i-1].year < parseInt(breakYear))) {
      html += `<div class="era-block"><div class="year-ruler"><div></div><div class="year-ruler-label">${breakYear}</div><div></div></div><div class="era-label">${label}</div></div>`;
    }
  }

  // Generation label (only for family events with gen)
  if (ev.gen && ev.gen !== lastGen && ev.side === 'family') {
    lastGen = ev.gen;
    if (genLabels[ev.gen]) {
      html += `<div class="generation-label">${genLabels[ev.gen]}</div>`;
    }
  }

  const dc = dotClass[ev.dot] || 'dot-family';
  const cardClass = ev.side === 'family' ? 'family' : 'history';
  const emptyClass = 'empty';

  const card = `
    <div class="tl-card ${cardClass}" onclick="this.classList.toggle('open')">
      <div class="tl-year">${ev.year}</div>
      <div class="tl-title">${ev.title}</div>
      ${ev.sub ? `<div class="tl-subtitle">${ev.sub}</div>` : ''}
      ${ev.detail ? `<div class="tl-detail">${ev.detail}</div>` : ''}
    </div>`;

  const empty = `<div class="tl-card ${emptyClass}"></div>`;
  const spine = `<div class="tl-spine"><div class="tl-dot ${dc}"></div><div class="tl-spine-line"></div></div>`;

  if (ev.side === 'family') {
    html += `<div class="tl-row">${card}${spine}${empty}</div>`;
  } else {
    html += `<div class="tl-row">${empty}${spine}${card}</div>`;
  }
});

tl.innerHTML = html;
</script>
